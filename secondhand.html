  <head>

    <meta property="og:type" content="website" />
    <meta property="og:title" content="TCS Store" />
    <meta
      property="og:description"
      content="Your one-stop shop for campus books and supplies."
    />
    <meta
      property="og:image"
      content="https://techno-cs.vercel.app/assets/logo.png"
    />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TCS Store" />
    <meta

    <title>Secondhand — TCS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"

    />
    <link

      rel="stylesheet"
    />
    <link

      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <script>
      tailwind.config = {
        theme: { extend: { fontFamily: { sans: ["Inter", "sans-serif"] } } },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      body {
        font-family: "Inter", sans-serif;
      }
      .item-card {
        transition:
          transform 0.18s ease,
          box-shadow 0.18s ease;
      }
      .item-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
      }
      .cat-btn.active {
        background-color: #1c1917;
        color: #fff;
        border-color: #1c1917;
      }
      .cond-btn.active {
        background-color: #1c1917;
        color: #fff;
        border-color: #1c1917;
      }
      .sort-btn.active {
        background-color: #1c1917;
        color: #fff;
        border-color: #1c1917;
      }
      #items-grid {
        transition: opacity 0.15s ease;
      }
      #items-grid.sorting {
        opacity: 0.35;
      }
      #sidebar {
        position: sticky;
        align-self: flex-start;
      }
      #filter-drawer {
        transform: translateX(-100%);
        transition: transform 0.25s ease;
      }
      #filter-drawer.open {
        transform: translateX(0);
      }
      #drawer-overlay {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s ease;
      }
      #drawer-overlay.open {
        opacity: 1;
        pointer-events: all;
      }
    </style>
  </head>

  <body class="bg-stone-50 text-stone-900 antialiased">
    <div id="header"></div>

    <!-- Page Header -->
    <section class="bg-stone-100 border-b border-stone-200">
      <div
        class="mx-auto max-w-7xl px-6 py-8 flex items-center justify-between gap-4"
      >
        <div>
          <h1
            data-i18n="page_secondhand_title"
            class="text-3xl sm:text-5xl font-black text-stone-800 leading-tight"
          >
            Secondhand
          </h1>
        </div>
        <div class="flex items-center gap-3">
          <p id="result-count" class="text-sm font-semibold text-stone-400"></p>
          <button
            id="mobile-filter-btn"
            class="flex md:hidden items-center gap-1.5 border border-stone-300 bg-white text-xs font-bold uppercase tracking-widest px-4 py-2 rounded hover:bg-stone-800 hover:text-white hover:border-stone-800 transition-colors"
          >
            <span class="material-symbols-outlined" style="font-size: 16px"
              >tune</span
            >
            <span data-i18n="btn_filter">Filter</span>
          </button>
        </div>
      </div>
    </section>

    <!-- Main layout -->
    <div class="mx-auto max-w-7xl px-6 py-8 flex gap-8 items-start">
      <!-- SIDEBAR -->
      <aside id="sidebar" class="hidden md:block w-52 flex-shrink-0">
        <div class="mb-8">
          <p
            data-i18n="filter_category"
            class="text-xs font-black uppercase tracking-widest text-stone-400 mb-3"
          >
            Category
          </p>
          <div class="flex flex-col gap-1">
            <button
              data-cat="all"
              data-i18n="filter_all_items"
              class="cat-btn active text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors hover:bg-stone-800 hover:text-white hover:border-stone-800"
            >
              All Items
            </button>
            <button
              data-cat="books"
              data-i18n="filter_books"
              class="cat-btn text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors hover:bg-stone-800 hover:text-white hover:border-stone-800"
            >
              Books
            </button>
            <button
              data-cat="supplies"
              data-i18n="filter_supplies"
              class="cat-btn text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors hover:bg-stone-800 hover:text-white hover:border-stone-800"
            >
              Supplies
            </button>
          </div>
        </div>

        <div class="border-t border-stone-200 mb-8"></div>

        <div class="mb-8">
          <p
            data-i18n="filter_condition"
            class="text-xs font-black uppercase tracking-widest text-stone-400 mb-3"
          >
            Condition
          </p>
          <div class="flex flex-col gap-1">
            <button
              data-cond="all"
              data-i18n="filter_all_conditions"
              class="cond-btn active text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors hover:bg-stone-800 hover:text-white hover:border-stone-800"
            >
              All Conditions
            </button>
            <button
              data-cond="like-new"
              data-i18n="filter_like_new"
              class="cond-btn text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors hover:bg-stone-800 hover:text-white hover:border-stone-800"
            >
              Like New
            </button>
            <button
              data-cond="good"
              data-i18n="filter_good"
              class="cond-btn text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors hover:bg-stone-800 hover:text-white hover:border-stone-800"
            >
              Good
            </button>
            <button
              data-cond="fair"
              data-i18n="filter_fair"
              class="cond-btn text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors hover:bg-stone-800 hover:text-white hover:border-stone-800"
            >
              Fair
            </button>
          </div>
        </div>

        <div class="border-t border-stone-200 mb-8"></div>

        <div>
          <p
            data-i18n="filter_sort"
            class="text-xs font-black uppercase tracking-widest text-stone-400 mb-3"
          >
            Sort By
          </p>
          <div class="flex flex-col gap-1">
            <button
              data-sort="default"
              data-i18n="sort_default"
              class="sort-btn active text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors hover:bg-stone-800 hover:text-white hover:border-stone-800"
            >
              Default
            </button>
            <button
              data-sort="az"
              data-i18n="sort_az"
              class="sort-btn text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors hover:bg-stone-800 hover:text-white hover:border-stone-800"
            >
              A → Z
            </button>
            <button
              data-sort="za"
              data-i18n="sort_za"
              class="sort-btn text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors hover:bg-stone-800 hover:text-white hover:border-stone-800"
            >
              Z → A
            </button>
            <button
              data-sort="lowhigh"
              data-i18n="sort_low_high"
              class="sort-btn text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors hover:bg-stone-800 hover:text-white hover:border-stone-800"
            >
              Price: Low → High
            </button>
            <button
              data-sort="highlow"
              data-i18n="sort_high_low"
              class="sort-btn text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors hover:bg-stone-800 hover:text-white hover:border-stone-800"
            >
              Price: High → Low
            </button>
          </div>
        </div>
      </aside>

      <!-- GRID -->
      <div class="flex-1 min-w-0">
        <div
          id="items-grid"
          class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-5"
        ></div>
        <div

          class="hidden flex flex-col items-center justify-center py-24 text-center"
        >
          <span
            class="material-symbols-outlined text-stone-300 mb-4"
            style="font-size: 56px"

          >
          <p
            data-i18n="empty_items"
            class="text-stone-400 font-bold uppercase tracking-widest text-sm"

            No items found
          </p>
        </div>
      </div>
    </div>

    <!-- MOBILE DRAWER -->
    <div id="drawer-overlay" class="fixed inset-0 bg-black/40 z-50"></div>
    <div
      id="filter-drawer"
      class="fixed top-0 left-0 h-full w-72 bg-white z-50 shadow-2xl flex flex-col"
    >
      <div
        class="flex items-center justify-between px-6 py-4 border-b border-stone-100"
      >
        <p
          data-i18n="filter_title"
          class="text-sm font-black uppercase tracking-widest text-stone-800"
        >
          Filter &amp; Sort
        </p>
        <button
          id="close-drawer"
          class="text-stone-400 hover:text-stone-800 transition-colors"
        >
          <span class="material-symbols-outlined" style="font-size: 22px"
            >close</span
          >
        </button>
      </div>
      <div class="flex-1 overflow-y-auto px-6 py-6">
        <!-- Category -->
        <p
          data-i18n="filter_category"
          class="text-xs font-black uppercase tracking-widest text-stone-400 mb-3"
        >
          Category
        </p>
        <div class="flex flex-col gap-1 mb-8">
          <button
            data-cat="all"
            data-i18n="filter_all_items"
            class="cat-btn active text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors"
          >
            All Items
          </button>
          <button
            data-cat="books"
            data-i18n="filter_books"
            class="cat-btn text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors"
          >
            Books
          </button>
          <button
            data-cat="supplies"
            data-i18n="filter_supplies"
            class="cat-btn text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors"
          >
            Supplies
          </button>
        </div>
        <div class="border-t border-stone-100 mb-8"></div>
        <p
          data-i18n="filter_condition"
          class="text-xs font-black uppercase tracking-widest text-stone-400 mb-3"
        >
          Condition
        </p>
        <div class="flex flex-col gap-1 mb-8">
          <button
            data-cond="all"
            data-i18n="filter_all_conditions"
            class="cond-btn active text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors"
          >
            All Conditions
          </button>
          <button
            data-cond="like-new"
            data-i18n="filter_like_new"
            class="cond-btn text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors"
          >
            Like New
          </button>
          <button
            data-cond="good"
            data-i18n="filter_good"
            class="cond-btn text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors"
          >
            Good
          </button>
          <button
            data-cond="fair"
            data-i18n="filter_fair"
            class="cond-btn text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors"
          >
            Fair
          </button>
        </div>
        <div class="border-t border-stone-100 mb-8"></div>
        <p
          data-i18n="filter_sort"
          class="text-xs font-black uppercase tracking-widest text-stone-400 mb-3"
        >
          Sort By
        </p>
        <div class="flex flex-col gap-1">
          <button
            data-sort="default"
            data-i18n="sort_default"
            class="sort-btn active text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors"
          >
            Default
          </button>
          <button
            data-sort="az"
            data-i18n="sort_az"
            class="sort-btn text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors"
          >
            A → Z
          </button>
          <button
            data-sort="za"
            data-i18n="sort_za"
            class="sort-btn text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors"
          >
            Z → A
          </button>
          <button
            data-sort="lowhigh"
            data-i18n="sort_low_high"
            class="sort-btn text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors"
          >
            Price: Low → High
          </button>
          <button
            data-sort="highlow"
            data-i18n="sort_high_low"
            class="sort-btn text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors"
          >
            Price: High → Low
          </button>
        </div>
      </div>
    </div>

    <div id="footer"></div>
    <script src="translations.js"></script>
    <script src="data.js"></script>
    <script src="script.js"></script>

    <script>
      // Data loaded from data.js
      const ITEMS = SECONDHAND.map(resolveSecondhand).filter(Boolean);

      // Condition config
      const condConfig = {
        "like-new": { label: "Like New", color: "bg-green-100 text-green-700" },
        good: { label: "Good", color: "bg-blue-100 text-blue-600" },
        fair: { label: "Fair", color: "bg-yellow-100 text-yellow-700" },
      };

      let activeCategory = "all";
      let activeCondition = "all";
      let activeSort = "default";

      function getFiltered() {
        let list = [...ITEMS];
        if (activeCategory === "books")
          list = list.filter((i) => i.category === "books");
        if (activeCategory === "supplies")
          list = list.filter((i) => i.category === "supplies");
        if (activeCondition !== "all")
          list = list.filter((i) => i.condition === activeCondition);
        switch (activeSort) {
          case "az":
            list.sort((a, b) => a.title.localeCompare(b.title));
            break;
          case "za":
            list.sort((a, b) => b.title.localeCompare(a.title));
            break;
          case "lowhigh":
            list.sort((a, b) => a.salePrice - b.salePrice);
            break;
          case "highlow":
            list.sort((a, b) => b.salePrice - a.salePrice);
            break;
        }
        return list;
      }

      function renderGrid() {
        const grid = document.getElementById("items-grid");
        const empty = document.getElementById("empty-state");
        const count = document.getElementById("result-count");
        const items = getFiltered();
        grid.classList.add("sorting");
        
        setTimeout(() => {
          if (!items.length) {
            grid.innerHTML = "";
            empty.classList.remove("hidden");
          } else {
            empty.classList.add("hidden");
            grid.innerHTML = items
              .map((i) => {
                const cond = condConfig[i.condition];
                const isBook = i.category === "books";
                // Create the key for the translation dictionary (e.g. cond_like_new)
                const conditionKey = "cond_" + i.condition.replace("-", "_");
                const categoryKey = isBook ? "cat_book" : "cat_supply";
                
                return `
              <div class="item-card bg-white rounded-lg p-3 flex flex-col gap-3 border border-stone-100 cursor-pointer">
                <div class="relative bg-stone-50 rounded overflow-hidden flex items-center justify-center" style="height:190px;">
                  <img src="${i.cover}" alt="${i.title}"
                    class="h-full w-full ${isBook ? "object-contain" : "object-cover"} rounded" />
                  <span data-i18n="${conditionKey}" class="absolute top-2 left-2 text-xs font-bold uppercase tracking-wide px-2 py-0.5 rounded ${cond.color}">
                    ${cond.label}
                  </span>
                </div>
                <div class="flex-1 flex flex-col gap-1">
                  <span data-i18n="${categoryKey}" class="text-xs font-bold uppercase tracking-widest px-2 py-0.5 rounded w-fit ${isBook ? "bg-orange-100 text-orange-600" : "bg-teal-100 text-teal-600"}">
                    ${isBook ? "Book" : "Supply"}
                  </span>
                  <p class="font-bold text-stone-800 text-sm leading-snug mt-1">${i.title}</p>
                  <div class="flex items-center gap-2">
                    <p class="text-orange-500 font-black text-sm">$${i.salePrice.toFixed(2)} <span class="text-stone-400 font-normal text-xs">USD</span></p>
                    <p class="text-stone-400 line-through text-xs">$${i.originalPrice.toFixed(2)}</p>
                  </div>
                </div>
                <button data-i18n="btn_details" class="w-full bg-stone-800 hover:bg-stone-900 text-white text-xs font-bold uppercase tracking-widest py-2 rounded transition-colors">Details</button>
              </div>
            `;
              })
              .join("");
          }
          
          // Update count with translation keys
          const countKey = items.length === 1 ? 'result_item' : 'result_items';
          const fallbackText = items.length === 1 ? 'item' : 'items';
          count.innerHTML = `${items.length} <span data-i18n="${countKey}">${fallbackText}</span>`;
          
          grid.classList.remove("sorting");
          
          // Force translation engine to catch newly drawn elements
          if (window.i18n) window.i18n.apply();
        }, 120);
      }

      function syncButtons() {
        document
          .querySelectorAll(".cat-btn")
          .forEach((b) =>
            b.classList.toggle("active", b.dataset.cat === activeCategory),
          );
        document
          .querySelectorAll(".cond-btn")
          .forEach((b) =>
            b.classList.toggle("active", b.dataset.cond === activeCondition),
          );
        document
          .querySelectorAll(".sort-btn")
          .forEach((b) =>
            b.classList.toggle("active", b.dataset.sort === activeSort),
          );
      }

      document.querySelectorAll(".cat-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          activeCategory = btn.dataset.cat;
          syncButtons();
          renderGrid();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
      });
      document.querySelectorAll(".cond-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          activeCondition = btn.dataset.cond;
          syncButtons();
          renderGrid();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
      });
      document.querySelectorAll(".sort-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          activeSort = btn.dataset.sort;
          syncButtons();
          renderGrid();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
      });

      const drawer = document.getElementById("filter-drawer");
      const overlay = document.getElementById("drawer-overlay");
      const openDrawer = () => {
        drawer.classList.add("open");
        overlay.classList.add("open");
      };
      const closeDrawer = () => {
        drawer.classList.remove("open");
        overlay.classList.remove("open");
      };
      document
        .getElementById("mobile-filter-btn")
        .addEventListener("click", openDrawer);
      document
        .getElementById("close-drawer")
        .addEventListener("click", closeDrawer);
      overlay.addEventListener("click", closeDrawer);

      function setSidebarTop() {
        const nav = document.querySelector("#header header");
        const sidebar = document.getElementById("sidebar");
        if (!sidebar) return;
        sidebar.style.top = (nav ? nav.offsetHeight : 64) + 16 + "px";
      }
      const obs = new MutationObserver(() => {
        setSidebarTop();
        obs.disconnect();
      });
      obs.observe(document.getElementById("header"), { childList: true });
      window.addEventListener("resize", setSidebarTop);

      renderGrid();
    </script>
  </body>
</html>
