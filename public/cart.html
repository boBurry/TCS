<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Cart | TCS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .group:hover .group-hover\:block {
        display: block;
      }
    </style>
  </head>
  <body class="bg-white text-black font-mono flex flex-col min-h-screen">
    <header class="border-b-4 border-black sticky top-0 bg-white z-50">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4">
        <div class="flex justify-between items-center mb-4 md:mb-0 gap-4">
          <a
            href="index.html"
            class="border-4 border-black p-2 font-black text-xl uppercase hover:bg-black hover:text-white transition"
            >TCS</a
          >

          <nav class="hidden md:flex flex-grow justify-center">
            <div
              class="flex space-x-8 text-lg font-bold uppercase tracking-tighter items-center"
            >
              <a
                href="index.html"
                class="hover:text-gray-600 border-b-4 border-orange-500"
                >Home</a
              >

              <div class="relative group">
                <button
                  class="hover:text-gray-600 flex items-center py-2 uppercase"
                >
                  Category
                  <svg
                    class="w-4 h-4 ml-1"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="3"
                      d="M19 9l-7 7-7-7"
                    ></path>
                  </svg>
                </button>
                <div
                  class="absolute left-0 top-full hidden group-hover:block w-48 bg-white border-4 border-black shadow-[5px_5px_0px_0px_rgba(0,0,0,1)] z-50"
                >
                  <a
                    href="books.html"
                    class="block px-4 py-2 border-b-4 border-black hover:bg-gray-100 font-black uppercase"
                    >Books</a
                  >
                  <a
                    href="supplies.html"
                    class="block px-4 py-2 hover:bg-gray-100 font-black uppercase"
                    >Supplies</a
                  >
                </div>
              </div>

              <a href="secondhand.html" class="hover:text-gray-600"
                >Secondhand</a
              >
              <a href="about.html" class="hover:text-gray-600">About</a>
            </div>
          </nav>

          <div class="flex items-center space-x-3 sm:space-x-6">
            <div
              class="relative items-center border-2 border-black px-3 py-1 bg-gray-50 hidden lg:flex"
            >
              <input
                type="text"
                placeholder="SEARCH..."
                class="bg-transparent outline-none w-48 uppercase text-sm font-bold"
              />
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="3"
                  d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
                />
              </svg>
            </div>
            <button
              class="border-2 border-black p-1 hover:bg-black hover:text-white transition lg:hidden"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-6 w-6"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
                />
              </svg>
            </button>
            <a
              href="cart.html"
              class="border-2 border-black p-1 hover:bg-black hover:text-white transition"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-6 w-6"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"
                />
              </svg>
            </a>
          </div>
        </div>

        <nav
          class="md:hidden overflow-x-auto pb-2 -mx-4 px-4 sm:mx-0 sm:px-0 scrollbar-hide"
        >
          <div
            class="flex space-x-6 text-sm font-bold uppercase tracking-tighter whitespace-nowrap min-w-max"
          >
            <a href="index.html" class="border-b-4 border-orange-500">Home</a>
            <a href="books.html" class="hover:text-gray-600">Books</a>
            <a href="supplies.html" class="hover:text-gray-600">Supplies</a>
            <a href="secondhand.html" class="hover:text-gray-600">Secondhand</a>
            <a href="about.html" class="hover:text-gray-600">About</a>
          </div>
        </nav>
      </div>
    </header>
    <main class="max-w-5xl mx-auto px-6 py-12 flex-grow w-full">
      <div class="flex items-center mb-10">
        <div class="bg-black text-white p-2 mr-4">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-8 w-8"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="3"
              d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"
            />
          </svg>
        </div>
        <h1 class="text-4xl font-black uppercase italic tracking-tighter">
          My Cart
        </h1>
      </div>

      <div
        class="bg-white border-4 border-black p-8 shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] mb-10"
      >
        <div id="cart-items" class="space-y-6">
          <div
            class="flex flex-col md:flex-row items-center justify-between border-b-4 border-black pb-6 gap-6"
          >
            <div class="flex items-center gap-6 w-full md:w-auto">
              <div
                class="w-24 h-24 border-4 border-black relative flex items-center justify-center bg-gray-50 flex-shrink-0"
              >
                <span
                  class="text-xs font-black uppercase z-10 bg-white border-2 border-black px-2 py-1"
                  >Item</span
                >
                <div
                  class="absolute inset-0 border-t-2 border-black rotate-45 scale-150 opacity-10"
                ></div>
              </div>
              <div>
                <h3
                  class="font-black text-xl uppercase underline decoration-4 mb-1"
                >
                  Intro to C++
                </h3>
                <p class="text-sm font-bold text-gray-600 mb-2 italic">
                  Secondhand Book
                </p>
                <p class="font-black text-xl">$12.50</p>
              </div>
            </div>

            <div
              class="flex items-center gap-6 w-full md:w-auto justify-between md:justify-end"
            >
              <div class="flex items-center border-4 border-black bg-white">
                <button
                  class="px-3 py-1 hover:bg-black hover:text-white transition font-black text-lg decrease-btn"
                  data-price="12.50"
                >
                  -
                </button>
                <span
                  class="px-4 py-1 border-x-4 border-black font-black qty-display"
                  >1</span
                >
                <button
                  class="px-3 py-1 hover:bg-black hover:text-white transition font-black text-lg increase-btn"
                  data-price="12.50"
                >
                  +
                </button>
              </div>

              <button
                class="border-4 border-black p-2 hover:bg-red-500 hover:text-white transition"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="h-6 w-6"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                  stroke-width="3"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M6 18L18 6M6 6l12 12"
                  />
                </svg>
              </button>

              <p class="font-black text-2xl w-24 text-right item-total">
                $12.50
              </p>
            </div>
          </div>

          <div
            class="flex flex-col md:flex-row items-center justify-between gap-6 pt-2"
          >
            <div class="flex items-center gap-6 w-full md:w-auto">
              <div
                class="w-24 h-24 border-4 border-black relative flex items-center justify-center bg-gray-50 flex-shrink-0"
              >
                <span
                  class="text-xs font-black uppercase z-10 bg-white border-2 border-black px-2 py-1"
                  >Item</span
                >
                <div
                  class="absolute inset-0 border-t-2 border-black rotate-45 scale-150 opacity-10"
                ></div>
              </div>
              <div>
                <h3
                  class="font-black text-xl uppercase underline decoration-4 mb-1"
                >
                  Blue Pens (Pack)
                </h3>
                <p class="text-sm font-bold text-gray-600 mb-2 italic">
                  Stationery
                </p>
                <p class="font-black text-xl">$3.00</p>
              </div>
            </div>

            <div
              class="flex items-center gap-6 w-full md:w-auto justify-between md:justify-end"
            >
              <div class="flex items-center border-4 border-black bg-white">
                <button
                  class="px-3 py-1 hover:bg-black hover:text-white transition font-black text-lg decrease-btn"
                  data-price="3.00"
                >
                  -
                </button>
                <span
                  class="px-4 py-1 border-x-4 border-black font-black qty-display"
                  >1</span
                >
                <button
                  class="px-3 py-1 hover:bg-black hover:text-white transition font-black text-lg increase-btn"
                  data-price="3.00"
                >
                  +
                </button>
              </div>

              <button
                class="border-4 border-black p-2 hover:bg-red-500 hover:text-white transition"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="h-6 w-6"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                  stroke-width="3"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M6 18L18 6M6 6l12 12"
                  />
                </svg>
              </button>

              <p class="font-black text-2xl w-24 text-right item-total">
                $3.00
              </p>
            </div>
          </div>
        </div>
      </div>

      <div
        class="flex flex-col md:flex-row justify-between items-start md:items-end gap-8 mb-12"
      >
        <a
          href="index.html"
          class="px-6 py-3 border-4 border-black bg-white font-black uppercase hover:bg-black hover:text-white transition-colors shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]"
        >
          Continue Shopping
        </a>

        <div
          class="w-full md:w-80 border-4 border-black p-6 bg-white shadow-[8px_8px_0px_0px_rgba(0,0,0,1)]"
        >
          <div class="flex justify-between items-center mb-4">
            <span class="text-lg font-black uppercase">Subtotal</span>
            <span id="subtotal" class="text-xl font-black">$15.50</span>
          </div>
          <div
            class="flex justify-between items-center border-t-4 border-black pt-4 mb-6"
          >
            <span class="text-2xl font-black uppercase">Total</span>
            <span id="grand-total" class="text-3xl font-black text-orange-500"
              >$15.50</span
            >
          </div>

          <a
            href="checkout.html"
            class="block w-full text-center bg-black text-white border-4 border-black px-6 py-4 font-black text-lg uppercase hover:bg-orange-500 hover:text-black transition-colors"
          >
            Checkout
          </a>
        </div>
      </div>
    </main>
    <footer class="border-t-4 border-black bg-white p-8 mt-auto">
      <div
        class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8"
      >
        <div class="flex items-center space-x-10">
          <span class="text-xl font-black uppercase border-b-4 border-black"
            >About Us</span
          >

          <div class="flex space-x-6 items-center">
            <a
              href="#"
              aria-label="Facebook"
              class="text-black hover:text-orange-500 hover:-translate-y-1 transition-all"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-7 h-7"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"
                ></path>
              </svg>
            </a>

            <a
              href="#"
              aria-label="Telegram"
              class="text-black hover:text-orange-500 hover:-translate-y-1 transition-all"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-7 h-7"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </a>

            <a
              href="#"
              aria-label="Phone"
              class="text-black hover:text-orange-500 hover:-translate-y-1 transition-all"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-7 h-7"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"
                ></path>
              </svg>
            </a>
          </div>
        </div>

        <div
          class="flex items-center bg-black text-white p-4 space-x-6 shadow-[4px_4px_0px_0px_rgba(0,0,0,0.2)]"
        >
          <span class="font-bold uppercase">Can't find what you want?</span>
          <button
            class="bg-white text-black px-6 py-2 font-black uppercase hover:bg-orange-500 transition"
          >
            Request
          </button>
        </div>
      </div>
    </footer>
    <script src="./js/cart.js"></script>
  </body>
</html>
