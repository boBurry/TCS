<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCS | Campus Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Trigger the dropdown on hover */
        .group:hover .group-hover\:block {
            display: block;
        }
    </style>
</head>
<body class="bg-white text-black font-mono"> 
    
    <header class="border-b-4 border-black sticky top-0 bg-white z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center">
            <div class="border-4 border-black p-2 font-black text-xl mr-12 uppercase">TCS</div>
            
            <nav class="flex-grow flex items-center">
                <div class="flex space-x-8 text-lg font-bold uppercase tracking-tighter items-center">
                    <a href="index.html" class="border-b-4 border-orange-500">Home</a>
                    
                    <div class="relative group">
                        <button class="hover:text-gray-600 flex items-center uppercase py-2">
                            Category
                            <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>
                        </button>
                        <div class="absolute left-0 top-full hidden group-hover:block w-48 bg-white border-4 border-black shadow-[5px_5px_0px_0px_rgba(0,0,0,1)] z-50">
                            <a href="books.html" class="block px-4 py-2 border-b-2 border-black hover:bg-gray-100 font-black">Books Page</a>
                            <a href="supplies.html" class="block px-4 py-2 hover:bg-gray-100 font-black">Supplies Page</a>
                        </div>
                    </div>

                    <a href="secondhand.html" class="hover:text-gray-600">Secondhand</a>
                    <a href="about.html" class="hover:text-gray-600">About</a>
                </div>

                <div class="ml-auto relative flex items-center border-2 border-black px-3 py-1 bg-gray-50">
                    <input type="text" placeholder="SEARCH..." class="bg-transparent outline-none w-64 uppercase text-sm font-bold">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                </div>
            </nav>

            <div class="flex items-center ml-12 space-x-6">
                <button class="border-2 border-black p-1 hover:bg-black hover:text-white transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                </button>
                <button class="border-2 border-black p-1 hover:bg-black hover:text-white transition">
                    <a href="cart.html">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
                    </a>
                </button>
            </div>
        </div>
    </header>

    <section class="grid grid-cols-1 md:grid-cols-2 border-b-4 border-black">
        <div class="p-12 border-r-4 border-black flex flex-col justify-center">
            <h1 class="text-6xl font-black uppercase leading-none mb-6">Techno<br>Campus<br>Store</h1>
            <p class="text-xl font-bold italic mb-8 border-l-4 border-black pl-4 uppercase">"Click, Collect, Excel. Reserve online, pick up on campus."</p>
        </div>
        <div class="bg-gray-100 flex items-center justify-center p-12 overflow-hidden">
            <div class="relative w-80 h-48 border-4 border-black bg-white flex items-center justify-center rotate-3 shadow-[15px_15px_0px_0px_rgba(0,0,0,1)]">
                <span class="font-black text-2xl uppercase">Hero Image</span>
                <div class="absolute -top-4 -left-4 w-full h-full border-2 border-black -rotate-6 -z-10 bg-gray-200"></div>
            </div>
        </div>
    </section>

    <main class="max-w-7xl mx-auto py-12 px-6 space-y-20">
        <section>
            <div class="flex items-center mb-10">
                <div class="bg-black text-white p-2 mr-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>
                </div>
                <h2 class="text-4xl font-black uppercase italic tracking-tighter">Most Popular</h2>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-8">
                <div class="group/card border-4 border-black p-5 hover:translate-x-1 hover:-translate-y-1 transition-transform shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] bg-white">
                    <div class="aspect-square border-2 border-black mb-4 flex items-center justify-center relative overflow-hidden bg-gray-50">
                        <div class="absolute inset-0 border-t-2 border-black rotate-45 scale-150 opacity-10"></div>
                        <div class="absolute inset-0 border-t-2 border-black -rotate-45 scale-150 opacity-10"></div>
                        <span class="font-bold border-2 border-black px-4 py-1 bg-white z-10 uppercase">Item</span>
                    </div>
                    <div class="h-2 w-3/4 bg-black mb-2"></div>
                    <div class="h-2 w-1/2 bg-black mb-6"></div>
                    <div class="flex justify-between items-end">
                        <span class="text-2xl font-black">$14.00</span>
                        <button class="border-4 border-black px-4 py-1 font-black uppercase hover:bg-black hover:text-white transition">Details</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="border-t-4 border-black bg-white p-8">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
            <div class="flex items-center space-x-10">
                <span class="text-xl font-black uppercase border-b-4 border-black">About Us</span>
                <div class="flex space-x-6">
                    <a href="#" class="font-bold hover:underline">FB</a>
                    <a href="#" class="font-bold hover:underline">TG</a>
                    <a href="#" class="font-bold hover:underline">PH</a>
                </div>
            </div>
            <div class="flex items-center bg-black text-white p-4 space-x-6">
                <span class="font-bold uppercase">Can't find what you want?</span>
                <button class="bg-white text-black px-6 py-2 font-black uppercase hover:bg-orange-500 transition">Request</button>
            </div>
        </div>
    </footer>

</body>
</html>
