<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TCS | Campus Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Trigger the dropdown on hover */
      .group:hover .group-hover\:block {
        display: block;
      }
    </style>
  </head>
  <body class="bg-white text-black font-mono">
    <header class="border-b-4 border-black sticky top-0 bg-white z-50">
      <div
        class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex justify-between items-center gap-4"
      >
        <a
          href="index.html"
          class="border-4 border-black p-2 font-black text-xl uppercase hover:bg-black hover:text-white transition shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:translate-x-1 hover:translate-y-1 hover:shadow-none"
          >TCS</a
        >

        <nav class="hidden md:flex flex-grow justify-center">
          <div
            class="flex space-x-8 text-lg font-bold uppercase tracking-tighter items-center"
          >
            <a
              href="index.html"
              class="hover:text-gray-600 border-b-4 border-orange-500"
              >Home</a
            >

            <div class="relative group">
              <button
                class="hover:text-gray-600 flex items-center py-2 uppercase"
              >
                Category
                <svg
                  class="w-4 h-4 ml-1"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="3"
                    d="M19 9l-7 7-7-7"
                  ></path>
                </svg>
              </button>
              <div
                class="absolute left-0 top-full hidden group-hover:block w-48 bg-white border-4 border-black shadow-[5px_5px_0px_0px_rgba(0,0,0,1)] z-50"
              >
                <a
                  href="books.html"
                  class="block px-4 py-2 border-b-4 border-black hover:bg-gray-100 font-black uppercase"
                  >Books</a
                >
                <a
                  href="supplies.html"
                  class="block px-4 py-2 hover:bg-gray-100 font-black uppercase"
                  >Supplies</a
                >
              </div>
            </div>

            <a href="secondhand.html" class="hover:text-gray-600">Secondhand</a>
            <a href="about.html" class="hover:text-gray-600">About</a>
          </div>
        </nav>

        <div class="hidden md:flex items-center space-x-6">
          <div
            class="relative flex items-center border-2 border-black px-3 py-1 bg-gray-50"
          >
            <input
              type="text"
              placeholder="SEARCH..."
              class="bg-transparent outline-none w-48 lg:w-64 uppercase text-sm font-bold"
            />
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="3"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
              />
            </svg>
          </div>
          <a
            href="cart.html"
            class="border-2 border-black p-1 hover:bg-black hover:text-white transition shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] active:translate-y-[2px] active:translate-x-[2px] active:shadow-none"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-6 w-6"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"
              />
            </svg>
          </a>
        </div>

        <div class="flex md:hidden items-center space-x-4">
          <a
            href="cart.html"
            class="border-2 border-black p-1 hover:bg-black hover:text-white transition shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] active:translate-y-[2px] active:translate-x-[2px] active:shadow-none"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-6 w-6"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"
              />
            </svg>
          </a>
          <button
            id="mobile-menu-btn"
            aria-label="Open Menu"
            class="border-2 border-black p-1 hover:bg-black hover:text-white transition shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] active:translate-y-[2px] active:translate-x-[2px] active:shadow-none"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-6 w-6"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="3"
                d="M4 6h16M4 12h16M4 18h16"
              />
            </svg>
          </button>
        </div>
      </div>
    </header>

    <div
      id="mobile-overlay"
      class="fixed inset-0 bg-black bg-opacity-60 z-[60] hidden transition-opacity md:hidden"
    ></div>

    <div
      id="mobile-sidebar"
      class="fixed inset-y-0 right-0 z-[70] w-72 sm:w-80 bg-white border-l-4 border-black transform translate-x-full transition-transform duration-300 ease-in-out flex flex-col md:hidden"
    >
      <div
        class="p-4 border-b-4 border-black flex justify-between items-center bg-gray-50"
      >
        <span class="font-black text-2xl uppercase italic">Menu</span>
        <button
          id="close-sidebar-btn"
          aria-label="Close Menu"
          class="border-2 border-black p-1 hover:bg-red-500 hover:text-white transition shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] active:translate-y-[2px] active:translate-x-[2px] active:shadow-none"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="3"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M6 18L18 6M6 6l12 12"
            />
          </svg>
        </button>
      </div>

      <nav
        class="flex-grow overflow-y-auto p-6 space-y-8 flex flex-col text-xl font-black uppercase tracking-tighter"
      >
        <div
          class="relative flex items-center border-4 border-black px-3 py-3 bg-white shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] focus-within:-translate-y-1 transition-transform"
        >
          <input
            type="text"
            placeholder="SEARCH..."
            class="bg-transparent outline-none w-full text-base font-bold uppercase"
          />
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6 ml-2 text-black"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="3"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
            />
          </svg>
        </div>

        <a href="index.html" class="hover:text-orange-500 w-fit">Home</a>

        <div class="flex flex-col space-y-4">
          <span class="text-gray-400 border-b-2 border-gray-200 pb-2"
            >Categories</span
          >
          <a
            href="books.html"
            class="hover:text-orange-500 pl-4 border-l-4 border-black"
            >Books</a
          >
          <a
            href="supplies.html"
            class="hover:text-orange-500 pl-4 border-l-4 border-black"
            >Supplies</a
          >
        </div>

        <a href="secondhand.html" class="hover:text-orange-500 w-fit"
          >Secondhand</a
        >
        <a href="about.html" class="hover:text-orange-500 w-fit">About</a>
      </nav>
    </div>

    <section class="flex flex-col md:flex-row border-b-4 border-black">
      <div
        class="p-8 md:p-12 border-b-4 md:border-b-0 md:border-r-4 border-black flex flex-col justify-center w-full md:w-1/2"
      >
        <h1
          class="text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-black uppercase leading-none mb-6"
        >
          Techno<br />Campus<br />Store
        </h1>
        <p
          class="text-lg md:text-xl font-bold italic mb-8 border-l-4 border-black pl-4 uppercase"
        >
          "Click, Collect, Excel. Reserve online, pick up on campus."
        </p>
      </div>
      <div
        class="bg-gray-100 flex items-center justify-center p-8 md:p-12 overflow-hidden w-full md:w-1/2"
      >
        <div
          class="relative w-full max-w-[320px] aspect-video border-4 border-black bg-white flex items-center justify-center rotate-3 shadow-[10px_10px_0px_0px_rgba(0,0,0,1)] md:shadow-[15px_15px_0px_0px_rgba(0,0,0,1)]"
        >
          <span class="font-black text-xl md:text-2xl uppercase"
            >Hero Image</span
          >
          <div
            class="absolute -top-4 -left-4 w-full h-full border-2 border-black -rotate-6 -z-10 bg-gray-200"
          ></div>
        </div>
      </div>
    </section>

    <main class="max-w-7xl mx-auto py-12 px-6 space-y-20">
      <section>
        <div class="flex items-center mb-10">
          <div class="bg-black text-white p-2 mr-4">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-8 w-8"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"
              />
            </svg>
          </div>
          <h2 class="text-4xl font-black uppercase italic tracking-tighter">
            Most Popular
          </h2>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-8">
          <div
            class="group/card border-4 border-black p-5 hover:translate-x-1 hover:-translate-y-1 transition-transform shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] bg-white"
          >
            <div
              class="aspect-square border-2 border-black mb-4 flex items-center justify-center relative overflow-hidden bg-gray-50"
            >
              <div
                class="absolute inset-0 border-t-2 border-black rotate-45 scale-150 opacity-10"
              ></div>
              <div
                class="absolute inset-0 border-t-2 border-black -rotate-45 scale-150 opacity-10"
              ></div>
              <span
                class="font-bold border-2 border-black px-4 py-1 bg-white z-10 uppercase"
                >Item</span
              >
            </div>
            <div class="h-2 w-3/4 bg-black mb-2"></div>
            <div class="h-2 w-1/2 bg-black mb-6"></div>
            <div class="flex justify-between items-end">
              <span class="text-2xl font-black">$14.00</span>
              <button
                class="border-4 border-black px-4 py-1 font-black uppercase hover:bg-black hover:text-white transition"
              >
                Details
              </button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="border-t-4 border-black bg-white p-8 mt-auto">
      <div
        class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8"
      >
        <div class="flex items-center space-x-10">
          <span class="text-xl font-black uppercase border-b-4 border-black"
            >About Us</span
          >

          <div class="flex space-x-6 items-center">
            <a
              href="#"
              aria-label="Facebook"
              class="text-black hover:text-orange-500 hover:-translate-y-1 transition-all"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-7 h-7"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"
                ></path>
              </svg>
            </a>

            <a
              href="#"
              aria-label="Telegram"
              class="text-black hover:text-orange-500 hover:-translate-y-1 transition-all"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-7 h-7"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </a>

            <a
              href="#"
              aria-label="Phone"
              class="text-black hover:text-orange-500 hover:-translate-y-1 transition-all"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-7 h-7"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"
                ></path>
              </svg>
            </a>
          </div>
        </div>

        <div
          class="flex items-center bg-black text-white p-4 space-x-6 shadow-[4px_4px_0px_0px_rgba(0,0,0,0.2)]"
        >
          <span class="font-bold uppercase">Can't find what you want?</span>
          <button
            class="bg-white text-black px-6 py-2 font-black uppercase hover:bg-orange-500 transition"
          >
            Request
          </button>
        </div>
      </div>
    </footer>
  </body>
  <script src="./js/sidebar.js"></script>
</html>
