<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Cart — TCS</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Siemreap&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: { extend: { fontFamily: { sans: ["Inter", "sans-serif"] } } }
      };
    </script>

    <style>
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
      }
      body { font-family: "Inter", sans-serif; }
      html { scroll-behavior: smooth; }

      .qty-btn { transition: background 0.15s, color 0.15s; }
      .qty-btn:hover { background: #1c1917; color: #fff; }

      .item-card { transition: box-shadow 0.2s; }
      .item-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.07); }

      .remove-btn { transition: color 0.15s, transform 0.15s; }
      .remove-btn:hover { color: #ef4444; transform: scale(1.1); }

      /* Toast */
      #toast { transition: opacity 0.3s ease, transform 0.3s ease; }
      #toast.show { opacity: 1 !important; transform: translateY(0) !important; }

      /* Slide-out animation for removed items */
      .removing {
        animation: slideOut 0.25s forwards;
      }
      @keyframes slideOut {
        to { opacity: 0; transform: translateX(40px); max-height: 0; margin: 0; padding: 0; overflow: hidden; }
      }
    </style>
  </head>

  <body class="bg-stone-50 text-stone-900 antialiased">
    <div id="header"></div>

    <main class="mx-auto max-w-7xl px-6 py-10">
      <!-- Page title -->
      <h1 class="text-3xl font-black text-stone-800 mb-8 flex items-center gap-3">
        <span class="material-symbols-outlined text-stone-600" style="font-size:32px">shopping_cart</span>
        Shopping Cart
        <span id="item-count-badge" class="text-base font-bold text-stone-400 ml-1"></span>
      </h1>

      <!-- Empty state -->
      <div id="empty-state" class="hidden flex flex-col items-center justify-center py-28 text-center">
        <span class="material-symbols-outlined text-stone-300 mb-5" style="font-size:80px">shopping_cart</span>
        <h2 class="text-2xl font-black text-stone-700 mb-2">Your cart is empty</h2>
        <p class="text-stone-400 text-sm mb-8">Browse our collection and add items you need.</p>
        <a href="index.html" class="bg-orange-400 hover:bg-orange-500 text-white text-sm font-bold uppercase tracking-widest px-8 py-3 rounded-lg transition-colors">
          Start Shopping
        </a>
      </div>

      <!-- Cart layout: items + summary -->
      <div id="cart-layout" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">

        <!-- Left: Cart items -->
        <div class="lg:col-span-2 flex flex-col gap-4" id="cart-items-container">
          <!-- items injected here -->
        </div>

        <!-- Right: Order Summary -->
        <div class="lg:col-span-1">
          <div class="bg-white border border-stone-200 rounded-2xl p-6 shadow-sm sticky top-6">
            <h2 class="text-lg font-black text-stone-800 mb-6">Order Summary</h2>

            <div class="flex flex-col gap-3 text-sm">
              <div class="flex justify-between items-center">
                <span class="text-stone-500">Subtotal</span>
                <span id="summary-subtotal" class="font-bold text-stone-800"></span>
              </div>
            </div>

            <div class="border-t border-stone-200 mt-5 pt-5 flex justify-between items-center">
              <span class="text-base font-black text-stone-800">Total</span>
              <span id="summary-total" class="text-2xl font-black text-orange-500"></span>
            </div>

            <button onclick="proceedToCheckout()" class="mt-6 w-full bg-orange-400 hover:bg-orange-500 active:scale-95 text-white font-bold uppercase tracking-widest text-sm py-3.5 rounded-xl transition-all flex items-center justify-center gap-2">
              Proceed to Checkout
              <span class="material-symbols-outlined" style="font-size:18px">arrow_forward</span>
            </button>

            <a href="index.html" class="mt-4 block text-center text-xs font-bold uppercase tracking-widest text-stone-400 hover:text-stone-700 transition-colors py-2">
              Continue Shopping
            </a>

            <!-- Security badges -->
            <div class="mt-6 pt-5 border-t border-stone-100 flex items-center justify-center gap-5 text-stone-300">
              <div class="flex items-center gap-1 text-xs text-stone-400">
                <span class="material-symbols-outlined" style="font-size:16px">lock</span>
                Secure checkout
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Recommended Section -->
      <section id="recommended-section" class="mt-16 border-t border-stone-200 pt-10">
        <h2 class="flex items-center gap-2 text-xl font-black text-stone-800 mb-6">
          <span class="material-symbols-outlined text-stone-600" style="font-size:22px">thumb_up</span>
          You might also need
        </h2>
        <div id="recommended-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-4"></div>
      </section>
    </main>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-6 right-6 bg-stone-900 text-white text-sm font-semibold px-5 py-3 rounded-xl shadow-xl flex items-center gap-3 opacity-0 pointer-events-none z-50" style="transform: translateY(12px)">
      <span class="material-symbols-outlined text-orange-400" style="font-size:18px">check_circle</span>
      <span id="toast-msg">Done!</span>
    </div>

    <div id="footer"></div>

    <script src="data.js"></script>
    <script src="script.js"></script>

    <script>
      // ── Cart helpers ──────────────────────────────────────────────────────
      function getCart() {
        return JSON.parse(localStorage.getItem("tcs_cart") || "[]");
      }
      function saveCart(cart) {
        localStorage.setItem("tcs_cart", JSON.stringify(cart));
        renderCart();
      }

      function showToast(msg) {
        const toast = document.getElementById("toast");
        document.getElementById("toast-msg").textContent = msg;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2200);
      }

      // ── Cart CRUD ─────────────────────────────────────────────────────────
      function removeItem(key) {
        const el = document.getElementById(`item-${CSS.escape(key)}`);
        if (el) {
          el.classList.add("removing");
          setTimeout(() => {
            const cart = getCart().filter(i => i.key !== key);
            saveCart(cart);
          }, 240);
        }
      }

      function changeQty(key, delta) {
        const cart = getCart();
        const item = cart.find(i => i.key === key);
        if (!item) return;
        item.qty = Math.max(1, item.qty + delta);
        saveCart(cart);
      }

      function clearCart() {
        if (!confirm("Clear all items from your cart?")) return;
        saveCart([]);
        showToast("Cart cleared.");
      }

      function proceedToCheckout() {
        const cart = getCart();
        if (!cart.length) return;
        window.location.href = "checkout.html"
      }

      // ── Render ────────────────────────────────────────────────────────────
      const CAT_LABELS = {
        books: "Books", supplies: "Supplies", secondhand: "Secondhand",
        cs: "CS", maths: "Maths", science: "Science",
        calculator: "Calculator", paper: "Paper", notebook: "Notebook",
        ruler: "Ruler", pen: "Pen", stationery: "Stationery"
      };

      function catLabel(cat) {
        return CAT_LABELS[cat] || cat.toUpperCase();
      }

      function renderCart() {
        const cart = getCart();
        const container  = document.getElementById("cart-items-container");
        const emptyState = document.getElementById("empty-state");
        const cartLayout = document.getElementById("cart-layout");
        const badge      = document.getElementById("item-count-badge");

        if (!cart.length) {
          emptyState.classList.remove("hidden");
          emptyState.classList.add("flex");
          cartLayout.classList.add("hidden");
          badge.textContent = "";
          renderRecommended([]);
          return;
        }

        emptyState.classList.add("hidden");
        emptyState.classList.remove("flex");
        cartLayout.classList.remove("hidden");
        cartLayout.classList.add("grid");

        const totalQty = cart.reduce((s, i) => s + i.qty, 0);
        badge.textContent = `(${totalQty} item${totalQty !== 1 ? "s" : ""})`;

        // Items
        container.innerHTML = cart.map(item => `
          <div id="item-${item.key}" class="item-card bg-white border border-stone-200 rounded-2xl p-5 flex gap-5 items-start">
            <!-- Image -->
            <a href="product-detail.html?type=${item.type}&id=${item.id}" class="flex-shrink-0 bg-stone-50 rounded-xl flex items-center justify-center border border-stone-100" style="width:96px;height:96px;">
              <img src="${item.cover}" alt="${item.title}" class="w-full h-full object-contain rounded-xl p-1" />
            </a>

            <!-- Info -->
            <div class="flex-1 min-w-0">
              <div class="flex items-start justify-between gap-2">
                <div>
                  <p class="text-xs font-bold uppercase tracking-widest text-stone-400 mb-1">${catLabel(item.category)}</p>
                  <a href="product-detail.html?type=${item.type}&id=${item.id}" class="font-bold text-stone-800 text-base leading-snug hover:text-orange-500 transition-colors">${item.title}</a>
                </div>
                <button onclick="removeItem('${item.key}')" class="remove-btn flex-shrink-0 text-stone-300 ml-2 mt-0.5">
                  <span class="material-symbols-outlined" style="font-size:20px">delete</span>
                </button>
              </div>

              <p class="text-orange-500 font-black text-lg mt-2">$${item.price.toFixed(2)}</p>

              <div class="flex items-center justify-between mt-3 flex-wrap gap-3">
                <!-- Qty control -->
                <div class="flex items-center border border-stone-200 rounded-lg overflow-hidden">
                  <button onclick="changeQty('${item.key}', -1)" class="qty-btn w-9 h-9 flex items-center justify-center text-stone-500 font-bold text-lg bg-stone-50">−</button>
                  <span class="w-10 text-center font-bold text-stone-800 text-sm">${item.qty}</span>
                  <button onclick="changeQty('${item.key}', 1)" class="qty-btn w-9 h-9 flex items-center justify-center text-stone-500 font-bold text-lg bg-stone-50">+</button>
                </div>

                <!-- Line total -->
                <p class="text-sm font-bold text-stone-500">
                  Subtotal: <span class="text-stone-800">$${(item.price * item.qty).toFixed(2)}</span>
                </p>
              </div>
            </div>
          </div>
        `).join("");

        // Summary
        const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
        document.getElementById("summary-subtotal").textContent = `$${subtotal.toFixed(2)}`;
        document.getElementById("summary-total").textContent    = `$${subtotal.toFixed(2)}`;

        // Recommend items not already in cart
        const cartIds = cart.map(i => `${i.type}-${i.id}`);
        const recs = [
          ...BOOKS.filter(b => !cartIds.includes(`book-${b.id}`)).slice(0, 3).map(b => ({ ...b, _type: "book", cover: b.cover })),
          ...SUPPLIES.filter(s => !cartIds.includes(`supply-${s.id}`)).slice(0, 2).map(s => ({ ...s, _type: "supply", cover: s.img }))
        ].slice(0, 5);
        renderRecommended(recs);
      }

      function renderRecommended(items) {
        const grid = document.getElementById("recommended-grid");
        if (!items.length) {
          grid.innerHTML = "";
          return;
        }
        grid.innerHTML = items.map(item => `
          <a href="product-detail.html?type=${item._type}&id=${item.id}" class="group bg-white border border-stone-200 rounded-xl p-4 flex flex-col gap-3 hover:shadow-md hover:border-stone-400 transition-all">
            <div class="bg-stone-50 rounded-lg flex items-center justify-center" style="height:110px">
              <img src="${item.cover}" alt="${item.title}" class="h-full w-full object-contain rounded" />
            </div>
            <p class="font-bold text-stone-800 text-xs leading-snug group-hover:text-orange-500 transition-colors">${item.title}</p>
            <p class="text-orange-500 font-black text-sm">$${item.price.toFixed(2)}</p>
            <button onclick="event.preventDefault(); quickAdd(event, '${item._type}', ${item.id}, '${item.title}', '${item.cover}', ${item.price}, '${item._type === 'book' ? item.category : item.category}')"
              class="text-xs font-bold uppercase tracking-widest text-stone-500 hover:text-orange-500 transition-colors border border-stone-200 hover:border-orange-300 py-1.5 rounded-lg">
              + Add to Cart
            </button>
          </a>
        `).join("");
      }

      function quickAdd(e, type, id, title, cover, price, category) {
        e.stopPropagation();
        const cart = getCart();
        const key = `${type}-${id}`;
        const existing = cart.find(i => i.key === key);
        if (existing) {
          existing.qty += 1;
        } else {
          cart.push({ key, type, id, title, cover, price, category, qty: 1 });
        }
        saveCart(cart);
        showToast(`${title} added!`);
      }

      // ── Init ──────────────────────────────────────────────────────────────
      renderCart();
    </script>
  </body>
</html>
