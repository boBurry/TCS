<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Techno Campus Store (TCS) - Your one-stop shop for campus books, supplies, and secondhand materials."
    />
    <meta name="author" content="TCS Team" />

    <meta name="theme-color" content="#fafaf9" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="TCS Store" />
    <meta
      property="og:description"
      content="Your one-stop shop for campus books and supplies."
    />
    <meta
      property="og:image"
      content="https://techno-cs.vercel.app/assets/logo.png"
    />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TCS Store" />
    <meta
      name="twitter:description"
      content="Your one-stop shop for campus books and supplies."
    />
    <meta
      name="twitter:image"
      content="https://techno-cs.vercel.app/assets/logo.png"
    />
    <title>TCS</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "sans-serif"],
            },
          },
        },
      };
    </script>

    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      body {
        font-family: "Inter", sans-serif;
      }

      html {
        scroll-behavior: smooth;
      }
    </style>
  </head>

  <body class="bg-stone-50 text-stone-900 antialiased">
    <div id="header"></div>

    <main class="mx-auto max-w-5xl px-6 py-12">
      <h1 class="text-3xl font-black text-stone-800 mb-8">My Profile</h1>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        <div
          class="bg-white p-6 rounded-lg shadow-sm border border-stone-200 flex flex-col items-center text-center h-fit"
        >
          <div
            class="w-28 h-28 bg-stone-100 rounded-full flex items-center justify-center mb-4 border border-stone-200"
          >
            <span class="material-symbols-outlined text-5xl text-stone-400"
              >person</span
            >
          </div>
          <h2 id="profile-name" class="text-xl font-black text-stone-800">
            Sun Sovisal
          </h2>
          <p
            id="profile-role"
            class="text-stone-500 text-sm font-semibold mb-6"
          >
            CS Student
          </p>

          <button
            class="w-full bg-orange-400 hover:bg-orange-500 text-white text-xs font-bold uppercase tracking-widest py-3 rounded transition-colors mb-3"
          >
            Edit Profile
          </button>

          <button
            onclick="logout()"
            class="w-full bg-stone-200 hover:bg-stone-300 text-stone-700 text-xs font-bold uppercase tracking-widest py-3 rounded transition-colors"
          >
            Log Out
          </button>

          <div class="w-full mt-6 border-t border-stone-100 pt-5 text-left">
            <p
              class="text-xs font-bold uppercase tracking-widest text-stone-400 mb-3"
            >
              Social
            </p>
            <div class="flex items-center gap-4">
              <a
                href="#"
                class="text-stone-400 hover:text-blue-500 transition-colors"
              >
                <i class="fa-brands fa-telegram text-2xl"></i>
              </a>
              <a
                href="#"
                class="text-stone-400 hover:text-blue-600 transition-colors"
              >
                <i class="fa-brands fa-facebook text-2xl"></i>
              </a>
              <a
                href="#"
                class="text-stone-400 hover:text-pink-600 transition-colors"
              >
                <i class="fa-brands fa-instagram text-2xl"></i>
              </a>
              <a
                href="#"
                class="text-stone-400 hover:text-stone-900 transition-colors"
              >
                <i class="fa-brands fa-x-twitter text-2xl"></i>
              </a>
            </div>
          </div>
        </div>

        <div
          class="md:col-span-2 bg-white p-6 rounded-lg shadow-sm border border-stone-200"
        >
          <h3
            class="text-lg font-black text-stone-800 mb-4 border-b border-stone-100 pb-2"
          >
            Personal Details
          </h3>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-8">
            <div>
              <p
                class="text-xs text-stone-400 font-bold uppercase tracking-wider mb-1"
              >
                Full Name
              </p>
              <p id="detail-name" class="text-stone-800 font-semibold">...</p>
            </div>
            <div>
              <p
                class="text-xs text-stone-400 font-bold uppercase tracking-wider mb-1"
              >
                Email
              </p>
              <p id="detail-email" class="text-stone-800 font-semibold">...</p>
            </div>
            <div>
              <p
                class="text-xs text-stone-400 font-bold uppercase tracking-wider mb-1"
              >
                Phone
              </p>
              <p id="detail-phone" class="text-stone-800 font-semibold">...</p>
            </div>
            <div>
              <p
                class="text-xs text-stone-400 font-bold uppercase tracking-wider mb-1"
              >
                Location
              </p>
              <p id="detail-location" class="text-stone-800 font-semibold">
                ...
              </p>
            </div>
          </div>

          <h3
            class="text-lg font-black text-stone-800 mb-4 border-b border-stone-100 pb-2"
          >
            Recent Orders
          </h3>
          <div class="flex flex-col gap-3">
            <div
              class="flex justify-between items-center bg-stone-50 p-4 rounded border border-stone-200 hover:border-stone-300 transition-colors"
            >
              <div class="flex items-center gap-4">
                <span class="material-symbols-outlined text-stone-400 text-2xl"
                  >menu_book</span
                >
                <div>
                  <p class="text-sm font-bold text-stone-800">
                    Introduction to Algorithms
                  </p>
                  <p class="text-xs text-stone-500 font-medium mt-0.5">
                    Order #1024 • Delivered
                  </p>
                </div>
              </div>
              <p class="text-orange-500 font-bold text-sm">$35.00</p>
            </div>

            <div
              class="flex justify-between items-center bg-stone-50 p-4 rounded border border-stone-200 hover:border-stone-300 transition-colors"
            >
              <div class="flex items-center gap-4">
                <span class="material-symbols-outlined text-stone-400 text-2xl"
                  >calculate</span
                >
                <div>
                  <p class="text-sm font-bold text-stone-800">
                    Casio FX-991EX Calculator
                  </p>
                  <p class="text-xs text-stone-500 font-medium mt-0.5">
                    Order #0981 • Processing
                  </p>
                </div>
              </div>
              <p class="text-orange-500 font-bold text-sm">$22.00</p>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div id="footer"></div>

    <script src="data.js"></script>
    <script src="script.js"></script>
    <script>
      // Auth guard — already handled in script.js but good as a fallback
      if (!localStorage.getItem("tcs_user")) {
        window.location.href = "login.html";
      }

      const user = JSON.parse(localStorage.getItem("tcs_user") || "{}");
      const fullName = `${user.firstName} ${user.lastName}`;

      document.getElementById("profile-name").textContent = fullName;
      document.getElementById("profile-role").textContent = user.role;
      document.getElementById("detail-name").textContent = fullName;
      document.getElementById("detail-email").textContent = user.email;
      document.getElementById("detail-phone").textContent = user.phone;
      document.getElementById("detail-location").textContent = user.location;
    </script>
  </body>
</html>
