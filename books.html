<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Books — TCS</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <script>
      tailwind.config = {
        theme: { extend: { fontFamily: { sans: ["Inter", "sans-serif"] } } },
      };
    </script>

    <style>
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
      }
      body { font-family: "Inter", sans-serif; }

      .book-card { transition: transform 0.18s ease, box-shadow 0.18s ease; }
      .book-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.10); }

      .cat-btn.active  { background-color: #1c1917; color: #fff; border-color: #1c1917; }
      .sort-btn.active { background-color: #1c1917; color: #fff; border-color: #1c1917; }

      #books-grid { transition: opacity 0.15s ease; }
      #books-grid.sorting { opacity: 0.35; }

      /* Sidebar sticky inside flex wrapper */
      #sidebar {
        position: sticky;
        align-self: flex-start;
      }

      /* Mobile drawer */
      #filter-drawer  { transform: translateX(-100%); transition: transform 0.25s ease; }
      #filter-drawer.open  { transform: translateX(0); }
      #drawer-overlay { opacity: 0; pointer-events: none; transition: opacity 0.25s ease; }
      #drawer-overlay.open { opacity: 1; pointer-events: all; }
    </style>
  </head>

  <body class="bg-stone-50 text-stone-900 antialiased">
    <div id="header"></div>

    <!-- Page Header -->
    <section class="bg-stone-100 border-b border-stone-200">
      <div class="mx-auto max-w-7xl px-6 py-8 flex items-center justify-between gap-4">
        <div>
          <p class="text-xs font-bold uppercase tracking-widest text-stone-400 mb-1">TCS Store</p>
          <h1 class="text-4xl sm:text-5xl font-black text-stone-800 leading-tight">Books</h1>
        </div>
        <div class="flex items-center gap-3">
          <p id="result-count" class="text-sm font-semibold text-stone-400"></p>
          <!-- Mobile filter toggle -->
          <button id="mobile-filter-btn"
            class="flex md:hidden items-center gap-1.5 border border-stone-300 bg-white text-xs font-bold uppercase tracking-widest px-4 py-2 rounded hover:bg-stone-800 hover:text-white hover:border-stone-800 transition-colors">
            <span class="material-symbols-outlined" style="font-size:16px">tune</span>
            Filter
          </button>
        </div>
      </div>
    </section>

    <!-- Main layout: sidebar + grid inside a flex wrapper -->
    <div class="mx-auto max-w-7xl px-6 py-8 flex gap-8 items-start">

      <!-- SIDEBAR (desktop) -->
      <aside id="sidebar" class="hidden md:block w-52 flex-shrink-0">

        <div class="mb-8">
          <p class="text-xs font-black uppercase tracking-widest text-stone-400 mb-3">Category</p>
          <div class="flex flex-col gap-1">
            <button data-cat="all"     class="cat-btn active text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors hover:bg-stone-800 hover:text-white hover:border-stone-800">All Books</button>
            <button data-cat="science" class="cat-btn text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors hover:bg-stone-800 hover:text-white hover:border-stone-800">Science</button>
            <button data-cat="maths"   class="cat-btn text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors hover:bg-stone-800 hover:text-white hover:border-stone-800">Maths</button>
            <button data-cat="cs"      class="cat-btn text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors hover:bg-stone-800 hover:text-white hover:border-stone-800">CS &amp; IT</button>
          </div>
        </div>

        <div class="border-t border-stone-200 mb-8"></div>

        <div>
          <p class="text-xs font-black uppercase tracking-widest text-stone-400 mb-3">Sort By</p>
          <div class="flex flex-col gap-1">
            <button data-sort="default"  class="sort-btn active text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors hover:bg-stone-800 hover:text-white hover:border-stone-800">Default</button>
            <button data-sort="az"       class="sort-btn text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors hover:bg-stone-800 hover:text-white hover:border-stone-800">A → Z</button>
            <button data-sort="za"       class="sort-btn text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors hover:bg-stone-800 hover:text-white hover:border-stone-800">Z → A</button>
            <button data-sort="lowhigh"  class="sort-btn text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors hover:bg-stone-800 hover:text-white hover:border-stone-800">Price: Low → High</button>
            <button data-sort="highlow"  class="sort-btn text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors hover:bg-stone-800 hover:text-white hover:border-stone-800">Price: High → Low</button>
          </div>
        </div>

      </aside>

      <!-- BOOKS GRID -->
      <div id="grid-container" class="flex-1 min-w-0">
        <div id="books-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-5"></div>
        <div id="empty-state" class="hidden flex flex-col items-center justify-center py-24 text-center">
          <span class="material-symbols-outlined text-stone-300 mb-4" style="font-size:56px">menu_book</span>
          <p class="text-stone-400 font-bold uppercase tracking-widest text-sm">No books found</p>
        </div>
      </div>
    </div>

    <!-- MOBILE DRAWER overlay -->
    <div id="drawer-overlay" class="fixed inset-0 bg-black/40 z-50"></div>

    <!-- MOBILE DRAWER panel -->
    <div id="filter-drawer" class="fixed top-0 left-0 h-full w-72 bg-white z-50 shadow-2xl flex flex-col">
      <div class="flex items-center justify-between px-6 py-4 border-b border-stone-100">
        <p class="text-sm font-black uppercase tracking-widest text-stone-800">Filter &amp; Sort</p>
        <button id="close-drawer" class="text-stone-400 hover:text-stone-800 transition-colors">
          <span class="material-symbols-outlined" style="font-size:22px">close</span>
        </button>
      </div>
      <div class="flex-1 overflow-y-auto px-6 py-6">
        <p class="text-xs font-black uppercase tracking-widest text-stone-400 mb-3">Category</p>
        <div class="flex flex-col gap-1 mb-8">
          <button data-cat="all"     class="cat-btn active text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors">All Books</button>
          <button data-cat="science" class="cat-btn text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors">Science</button>
          <button data-cat="maths"   class="cat-btn text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors">Maths</button>
          <button data-cat="cs"      class="cat-btn text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors">CS &amp; IT</button>
        </div>
        <div class="border-t border-stone-100 mb-8"></div>
        <p class="text-xs font-black uppercase tracking-widest text-stone-400 mb-3">Sort By</p>
        <div class="flex flex-col gap-1">
          <button data-sort="default"  class="sort-btn active text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors">Default</button>
          <button data-sort="az"       class="sort-btn text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors">A → Z</button>
          <button data-sort="za"       class="sort-btn text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors">Z → A</button>
          <button data-sort="lowhigh"  class="sort-btn text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors">Price: Low → High</button>
          <button data-sort="highlow"  class="sort-btn text-left text-xs font-bold uppercase tracking-widest px-3 py-2 rounded border border-stone-200 transition-colors">Price: High → Low</button>
        </div>
      </div>
    </div>

    <div id="footer"></div>
    <script src="script.js"></script>

    <script>
      const BOOKS = [
        { id:1,  title:"Calculus",                      category:"maths",   price:29.49, cover:"https://covers.openlibrary.org/b/id/6979861-L.jpg" },
        { id:2,  title:"Beginning C++ Compilers",       category:"cs",      price:12.99, cover:"https://covers.openlibrary.org/b/id/8739161-L.jpg" },
        { id:3,  title:"1st Year Chemistry",            category:"science", price:10.38, cover:"https://covers.openlibrary.org/b/id/8091016-L.jpg" },
        { id:4,  title:"Fundamental of Physics",        category:"science", price:17.99, cover:"https://covers.openlibrary.org/b/id/10527843-L.jpg" },
        { id:5,  title:"The Design of Everyday Things", category:"cs",      price:18.00, cover:"https://covers.openlibrary.org/b/id/8739161-L.jpg" },
        { id:6,  title:"Linear Algebra Done Right",     category:"maths",   price:22.50, cover:"https://covers.openlibrary.org/b/id/6979861-L.jpg" },
        { id:7,  title:"Organic Chemistry",             category:"science", price:31.00, cover:"https://covers.openlibrary.org/b/id/8091016-L.jpg" },
        { id:8,  title:"Introduction to Computer",      category:"cs",      price: 9.99, cover:"https://covers.openlibrary.org/b/id/8739161-L.jpg" },
        { id:9,  title:"A Textbook of Mathematics",     category:"maths",   price: 8.50, cover:"https://covers.openlibrary.org/b/id/8091016-L.jpg" },
        { id:10, title:"Clean Code",                    category:"cs",      price:14.00, cover:"https://covers.openlibrary.org/b/id/8739161-L.jpg" },
        { id:11, title:"Statistics for Engineers",      category:"maths",   price:19.99, cover:"https://covers.openlibrary.org/b/id/6979861-L.jpg" },
        { id:12, title:"Campbell Biology",              category:"science", price:35.00, cover:"https://covers.openlibrary.org/b/id/8091016-L.jpg" },
        { id:13, title:"Discrete Mathematics",          category:"maths",   price:24.00, cover:"https://covers.openlibrary.org/b/id/6979861-L.jpg" },
        { id:14, title:"Data Structures & Algorithms",  category:"cs",      price:27.50, cover:"https://covers.openlibrary.org/b/id/10527843-L.jpg" },
        { id:15, title:"General Physics Vol.1",         category:"science", price:21.00, cover:"https://covers.openlibrary.org/b/id/10527843-L.jpg" },
        { id:16, title:"Introduction to Algorithms",    category:"cs",      price:32.00, cover:"https://covers.openlibrary.org/b/id/8739161-L.jpg" },
        { id:17, title:"Probability & Statistics",      category:"maths",   price:16.75, cover:"https://covers.openlibrary.org/b/id/6979861-L.jpg" },
        { id:18, title:"Biochemistry Essentials",       category:"science", price:28.00, cover:"https://covers.openlibrary.org/b/id/8091016-L.jpg" },
        { id:19, title:"Computer Networks",             category:"cs",      price:23.99, cover:"https://covers.openlibrary.org/b/id/10527843-L.jpg" },
        { id:20, title:"Advanced Calculus",             category:"maths",   price:33.00, cover:"https://covers.openlibrary.org/b/id/6979861-L.jpg" },
      ];

      let activeCategory = "all";
      let activeSort     = "default";

      function getFiltered() {
        let list = activeCategory === "all" ? [...BOOKS] : BOOKS.filter(b => b.category === activeCategory);
        switch (activeSort) {
          case "az":      list.sort((a,b) => a.title.localeCompare(b.title)); break;
          case "za":      list.sort((a,b) => b.title.localeCompare(a.title)); break;
          case "lowhigh": list.sort((a,b) => a.price - b.price); break;
          case "highlow": list.sort((a,b) => b.price - a.price); break;
        }
        return list;
      }

      function catColor(c) {
        return c === "science" ? "bg-blue-100 text-blue-600"
             : c === "maths"   ? "bg-green-100 text-green-600"
             :                   "bg-purple-100 text-purple-600";
      }
      function catLabel(c) {
        return c === "cs" ? "CS & IT" : c.charAt(0).toUpperCase() + c.slice(1);
      }

      function renderGrid() {
        const grid  = document.getElementById("books-grid");
        const empty = document.getElementById("empty-state");
        const count = document.getElementById("result-count");
        const books = getFiltered();
        grid.classList.add("sorting");
        setTimeout(() => {
          if (!books.length) {
            grid.innerHTML = "";
            empty.classList.remove("hidden");
          } else {
            empty.classList.add("hidden");
            grid.innerHTML = books.map(b => `
              <div class="book-card bg-white rounded-lg p-3 flex flex-col gap-3 border border-stone-100 cursor-pointer">
                <div class="bg-stone-50 rounded flex items-center justify-center" style="height:190px;">
                  <img src="${b.cover}" alt="${b.title}" class="h-full w-full object-contain rounded" />
                </div>
                <div class="flex-1 flex flex-col gap-1">
                  <span class="text-xs font-bold uppercase tracking-widest px-2 py-0.5 rounded w-fit ${catColor(b.category)}">${catLabel(b.category)}</span>
                  <p class="font-bold text-stone-800 text-sm leading-snug mt-1">${b.title}</p>
                  <p class="text-orange-500 font-black text-sm">$${b.price.toFixed(2)} <span class="text-stone-400 font-normal text-xs">USD</span></p>
                </div>
                <button class="w-full bg-stone-800 hover:bg-stone-900 text-white text-xs font-bold uppercase tracking-widest py-2 rounded transition-colors">Details</button>
              </div>
            `).join("");
          }
          count.textContent = `${books.length} book${books.length !== 1 ? "s" : ""}`;
          grid.classList.remove("sorting");
        }, 120);
      }

      function syncButtons() {
        document.querySelectorAll(".cat-btn").forEach(b  => b.classList.toggle("active",  b.dataset.cat  === activeCategory));
        document.querySelectorAll(".sort-btn").forEach(b => b.classList.toggle("active", b.dataset.sort === activeSort));
      }

      document.querySelectorAll(".cat-btn").forEach(btn => {
        btn.addEventListener("click", () => { activeCategory = btn.dataset.cat; syncButtons(); renderGrid(); });
      });
      document.querySelectorAll(".sort-btn").forEach(btn => {
        btn.addEventListener("click", () => { activeSort = btn.dataset.sort; syncButtons(); renderGrid(); });
      });

      // Mobile drawer
      const drawer  = document.getElementById("filter-drawer");
      const overlay = document.getElementById("drawer-overlay");
      const openDrawer  = () => { drawer.classList.add("open");    overlay.classList.add("open"); };
      const closeDrawer = () => { drawer.classList.remove("open"); overlay.classList.remove("open"); };
      document.getElementById("mobile-filter-btn").addEventListener("click", openDrawer);
      document.getElementById("close-drawer").addEventListener("click", closeDrawer);
      overlay.addEventListener("click", closeDrawer);

      // Sticky sidebar — just needs correct top offset after nav loads
      function setSidebarTop() {
        const nav     = document.querySelector("#header header");
        const sidebar = document.getElementById("sidebar");
        if (!sidebar) return;
        sidebar.style.top = ((nav ? nav.offsetHeight : 64) + 16) + "px";
      }
      const obs = new MutationObserver(() => { setSidebarTop(); obs.disconnect(); });
      obs.observe(document.getElementById("header"), { childList: true });
      window.addEventListener("resize", setSidebarTop);

      renderGrid();
    </script>
  </body>
</html>
